<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexGame Lite — Login</title>
<style>
  :root {
    --bg: #0A0A0A; --panel: #161616; --card: #1E1E1E;
    --accent: #E62222; --gold: #FFD700; --red: #FF5566;
    --text: #CCCCCC; --dim: #888888; --border: #2A2A2A;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh; display: flex; align-items: center;
    justify-content: center;
  }
  .box {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 40px; width: 100%; max-width: 380px;
  }
  h1 { font-size: 1.4rem; text-align: center;
       margin-bottom: 4px; letter-spacing: 1px; }
  h1 .wm-w { color: #fff; }
  h1 .wm-r { color: var(--accent); }
  .sub { color: var(--dim); font-size: .8rem; text-align: center;
         margin-bottom: 28px; }
  label { display: block; font-size: .8rem; color: var(--accent);
          margin-bottom: 6px; text-transform: uppercase;
          letter-spacing: .5px; }
  input {
    width: 100%; background: var(--panel); border: 1px solid var(--border);
    color: #fff; padding: 11px 12px; border-radius: 6px; font-size: .95rem;
    margin-bottom: 18px;
  }
  input:focus { outline: none; border-color: var(--accent); }
  button {
    width: 100%; background: linear-gradient(90deg, #003344, #005566);
    color: var(--accent); border: 1px solid var(--accent);
    padding: 12px; border-radius: 6px; cursor: pointer;
    font-weight: 600; font-size: .95rem;
  }
  button:hover { background: #005566; }
  button:disabled { opacity: .5; cursor: wait; }
  .whop-btn {
    display: block; text-align: center; text-decoration: none;
    width: 100%; background: #0A0A0A; color: #FFFFFF;
    border: 1px solid var(--border); padding: 12px;
    border-radius: 6px; font-weight: 600; font-size: .95rem;
    margin-bottom: 18px;
  }
  .whop-btn:hover { border-color: #FFFFFF; }
  .divider {
    display: flex; align-items: center; color: var(--dim);
    font-size: .75rem; margin-bottom: 18px; text-transform: uppercase;
    letter-spacing: .5px;
  }
  .divider::before, .divider::after {
    content: ""; flex: 1; height: 1px; background: var(--border);
  }
  .divider span { padding: 0 10px; }
  .error {
    background: #2a0010; color: var(--red); border: 1px solid #5a0020;
    padding: 10px 12px; border-radius: 6px; font-size: .85rem;
    margin-bottom: 16px; display: none;
  }
  .footer { text-align: center; color: var(--dim); font-size: .78rem;
            margin-top: 22px; line-height: 1.5; }
  .footer a { color: var(--accent); text-decoration: none; }
</style>
<script>
!function(w,d,s,u,n,a,b){if(w[n])return;a=w[n]={q:[],t:+new Date,s:[],o:u,track:function(){a.q.push([+new Date].concat([].slice.call(arguments)))},setScope:function(){a.s=[].slice.call(arguments).filter(function(x){return typeof x==="string"});a.q.push([+new Date,"setScope"].concat(a.s))},scope:function(){var c=[].slice.call(arguments);return{track:function(){a.q.push([+new Date].concat([].slice.call(arguments)).concat([{__scope:c}]))}}}};b=d.createElement(s);b.async=1;b.src=u+"/s.js";d.getElementsByTagName(s)[0].parentNode.insertBefore(b,d.getElementsByTagName(s)[0])}(window,document,"script","https://t.whop.tw","whop");whop.setScope("biz_mNn7NSmrOxVAl7");whop.track("page");whop.track("pixel");
</script>
</head>
<body>

<div class="box">
  <h1>🎯 <span class="wm-w">NEX</span><span class="wm-r">GAME</span> <span class="wm-w">LITE</span></h1>
  <div class="sub">Sign in with your email and license key</div>

  <div class="error" id="error"></div>

  <a href="/api/auth/whop/start" class="whop-btn">Sign in with Whop</a>
  <div class="divider"><span>or use a license key</span></div>

  <form id="loginForm">
    <label for="email">Email</label>
    <input type="email" id="email" required autocomplete="email">

    <label for="key">License Key</label>
    <input type="text" id="key" required autocomplete="off"
           placeholder="XXXX-XXXX-XXXX-XXXX">

    <button type="submit" id="submitBtn">Sign In</button>
  </form>

  <div class="footer">
    Purchased through Whop? Use the button above — no key needed.<br>
    Contra client? Your key was sent directly — check your email or DM.
  </div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const errEl = document.getElementById('error');
  errEl.style.display = 'none';
  btn.disabled = true; btn.textContent = 'Signing in...';

  const email = document.getElementById('email').value;
  const key = document.getElementById('key').value;

  try {
    const r = await fetch(`/api/login?email=${encodeURIComponent(email)}` +
                          `&license_key=${encodeURIComponent(key)}`,
                          { method: 'POST', credentials: 'include' });
    if (r.ok) {
      const data = await r.json();
      if (window.whop && data.is_new_signup) {
        whop.track('complete_registration', { email: email, name: data.name });
      }
      window.location.href = '/';
    } else {
      const err = await r.json();
      errEl.textContent = err.detail || 'Login failed. Check your email and license key.';
      errEl.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Sign In';
    }
  } catch (err) {
    errEl.textContent = 'Connection error. Try again.';
    errEl.style.display = 'block';
    btn.disabled = false; btn.textContent = 'Sign In';
  }
});
</script>
</body>
</html>
